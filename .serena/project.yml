project_name: "run-jin"
encoding: "utf-8"
line_ending: "lf"

languages:
  - swift
language_backend: "LSP"

ignore_all_files_in_gitignore: true
ignored_paths:
  - ".build/"
  - "DerivedData/"
  - "*.xcodeproj/xcuserdata/"
  - "*.xcworkspace/xcuserdata/"
  - ".swiftpm/"
  - "build/"
  - ".DS_Store"

read_only: false

ls_specific_settings:
  swift:
    ls_path: "/usr/bin/sourcekit-lsp"

excluded_tools: []
included_optional_tools: []
fixed_tools: []

base_modes: []
default_modes:
  - interactive
  - editing

symbol_info_budget: 10
